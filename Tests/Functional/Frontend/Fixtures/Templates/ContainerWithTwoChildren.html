<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>
<f:comment>content area</f:comment>
<f:if condition="{content.201}">
  <f:for each="{content.201}" as="record">
    <h6>{record.header}</h6>
  </f:for>
</f:if>
<f:comment>container-processor</f:comment>
<f:if condition="{children_201}">
  <f:for each="{children_201}" as="child">
    <h6>{child.header}</h6>
  </f:for>
</f:if>
</html>
